services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: meditrack
      POSTGRES_PASSWORD: meditrack
      POSTGRES_DB: meditrack
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meditrack"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://meditrack:meditrack@db:5432/meditrack
      JWT_SECRET: meditrack-dev-secret-change-in-production
    ports:
      - "4000:4000"
    volumes:
      - .:/app
      - /app/node_modules
    # Runs migrations on every start. To seed reference data the first time,
    # run: docker compose run --rm api npx prisma db seed
    command: sh -c "npx prisma migrate deploy && npm run codegen && npm run server"

  nurse:
    build: .
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    working_dir: /app/apps/nurse
    command: npx vite --host

  pharmacist:
    build: .
    restart: unless-stopped
    ports:
      - "5174:5174"
    volumes:
      - .:/app
      - /app/node_modules
    working_dir: /app/apps/pharmacist
    command: npx vite --port 5174 --host

  admin:
    build: .
    restart: unless-stopped
    ports:
      - "5175:5175"
    volumes:
      - .:/app
      - /app/node_modules
    working_dir: /app/apps/admin
    command: npx vite --port 5175 --host

volumes:
  postgres_data:
